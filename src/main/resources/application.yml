server:
  port: 8080

spring:
  application:
    name: ai-job-helper

  datasource:
    url: jdbc:mysql://localhost:3306/ai_job_helper?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# DeepSeek API 配置（后续步骤使用）
deepseek:
  api-key: your-deepseek-api-key
  base-url: https://api.deepseek.com/v1
  model: deepseek-chat
